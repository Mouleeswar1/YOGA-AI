// POSE DETECTION ENGINE (MediaPipe simulation + real angle computation)
// ─────────────────────────────────────────────

// Compute angle at joint B formed by A-B-C with improved accuracy
function computeAngle(A, B, C) {
  if (!A || !B || !C) return null;
  // Check for valid visibility (confidence)
  if ((A.visibility || 0) < 0.3 || (B.visibility || 0) < 0.3 || (C.visibility || 0) < 0.3) return null;
  
  // Calculate vectors
  const BA = { x: A.x - B.x, y: A.y - B.y };
  const BC = { x: C.x - B.x, y: C.y - B.y };
  
  // Calculate magnitudes
  const magBA = Math.sqrt(BA.x * BA.x + BA.y * BA.y);
  const magBC = Math.sqrt(BC.x * BC.x + BC.y * BC.y);
  
  if (magBA < 0.001 || magBC < 0.001) return null; // Avoid division by zero
  
  // Calculate dot product and angle
  const dotProduct = BA.x * BC.x + BA.y * BC.y;
  const cosAngle = dotProduct / (magBA * magBC);
  // Clamp to [-1, 1] to avoid NaN from acos
  const clampedCos = Math.max(-1, Math.min(1, cosAngle));
  let angle = Math.acos(clampedCos) * 180 / Math.PI;
  
  return Math.round(angle);
}

function analyzeAngles(landmarks, targetAsana) {
  if (!landmarks || landmarks.length < 33) return null;
  const lm = landmarks;
  // MediaPipe landmark indices
  const pts = {
    leftShoulder: lm[11], rightShoulder: lm[12],
    leftElbow: lm[13], rightElbow: lm[14],
    leftWrist: lm[15], rightWrist: lm[16],
    leftHip: lm[23], rightHip: lm[24],
    leftKnee: lm[25], rightKnee: lm[26],
    leftAnkle: lm[27], rightAnkle: lm[28],
  };

  const angles = {
    leftKnee: computeAngle(pts.leftHip, pts.leftKnee, pts.leftAnkle),
    rightKnee: computeAngle(pts.rightHip, pts.rightKnee, pts.rightAnkle),
    leftHip: computeAngle(pts.leftShoulder, pts.leftHip, pts.leftKnee),
    rightHip: computeAngle(pts.rightShoulder, pts.rightHip, pts.rightKnee),
    leftShoulder: computeAngle(pts.leftElbow, pts.leftShoulder, pts.leftHip),
    rightShoulder: computeAngle(pts.rightElbow, pts.rightShoulder, pts.rightHip),
    leftElbow: computeAngle(pts.leftShoulder, pts.leftElbow, pts.leftWrist),
    rightElbow: computeAngle(pts.rightShoulder, pts.rightElbow, pts.rightWrist),
  };

  const target = targetAsana.keyAngles;
  const corrections = [];
  let totalScore = 0;
  let scoreCount = 0;

  const jointNames = {
    leftKnee: 'Left Knee', rightKnee: 'Right Knee',
    leftHip: 'Left Hip', rightHip: 'Right Hip',
    leftShoulder: 'Left Shoulder', rightShoulder: 'Right Shoulder',
    leftElbow: 'Left Elbow', rightElbow: 'Right Elbow',
  };

  const bodyParts = { arms: [], legs: [], posture: [] };

  Object.entries(target).forEach(([joint, targetAngle]) => {
    const actual = angles[joint];
    if (actual === null || actual === undefined) return;
    
    const diff = Math.abs(actual - targetAngle);
    // Improved scoring: more lenient with smooth degradation
    let partScore;
    if (diff <= 5) {
      partScore = 100; // Perfect
    } else if (diff <= 10) {
      partScore = 95 - diff; // Very good
    } else if (diff <= 20) {
      partScore = 90 - diff * 0.5; // Good
    } else if (diff <= 30) {
      partScore = 80 - diff * 0.5; // Fair
    } else {
      partScore = Math.max(0, 60 - diff * 1.5); // Poor
    }
    
    totalScore += partScore;
    scoreCount++;

    const name = jointNames[joint] || joint;
    let severity = 'good';
    let text = `${name} looks great!`;
    
    if (diff > 5) {
      if (diff > 30) {
        severity = 'bad';
        const direction = actual < targetAngle ? 'more open (flex more)' : 'more closed (extend more)';
        text = `${name}: ${Math.round(diff)}° off — ${direction}`;
      } else if (diff > 15) {
        severity = 'warn';
        const direction = actual < targetAngle ? 'slightly more open' : 'slightly more closed';
        text = `${name}: ${Math.round(diff)}° off — ${direction}`;
      } else {
        severity = 'warn';
        text = `${name}: minor adjustment needed (${Math.round(diff)}° off)`;
      }
    }
    
    corrections.push({ joint: name, severity, text, score: Math.round(partScore), diff });

    if (['leftKnee','rightKnee','leftHip','rightHip'].includes(joint)) bodyParts.legs.push(partScore);
    else if (['leftShoulder','rightShoulder','leftElbow','rightElbow'].includes(joint)) bodyParts.arms.push(partScore);
    else bodyParts.posture.push(partScore);
  });

  const avg = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 85;
  const overall = scoreCount > 0 ? Math.round(totalScore / scoreCount) : 0;

  // Sort corrections: good first, then warn, then bad
  corrections.sort((a, b) => {
    const order = { good: 0, warn: 1, bad: 2 };
    return order[a.severity] - order[b.severity];
  });

  return {
    overall,
    breakdown: { arms: avg(bodyParts.arms), legs: avg(bodyParts.legs), posture: avg(bodyParts.posture.length ? bodyParts.posture : [overall]) },
    corrections,
    angles,
  };
}

// Draw skeleton on canvas
function drawSkeleton(canvas, landmarks, videoEl) {
  if (!canvas || !landmarks || !videoEl) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const connections = [
    [11,12],[11,13],[13,15],[12,14],[14,16],
    [11,23],[12,24],[23,24],[23,25],[24,26],
    [25,27],[26,28],[27,29],[28,30],[29,31],[30,32],
  ];

  ctx.strokeStyle = 'rgba(122,200,130,0.85)';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  connections.forEach(([a,b]) => {
    const A = landmarks[a], B = landmarks[b];
    if (!A || !B) return;
    ctx.beginPath();
    ctx.moveTo(A.x * W, A.y * H);
    ctx.lineTo(B.x * W, B.y * H);
    ctx.stroke();
  });

  landmarks.forEach((lm, i) => {
    if (i > 32) return;
    ctx.beginPath();
    ctx.arc(lm.x * W, lm.y * H, 4, 0, Math.PI*2);
    ctx.fillStyle = i < 11 ? 'rgba(200,220,255,0.9)' : 'rgba(122,200,130,0.9)';
    ctx.fill();
  });
}

function useTimer(active) {
  const [time, setTime] = useState(0);
  useEffect(() => {
    if (!active) return;
    const id = setInterval(() => setTime(t => t + 1), 1000);
    return () => clearInterval(id);
  }, [active]);
  return time;
}

function useLocalStorage(key, initial) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; }
    catch { return initial; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
}

function ScoreCircle({ score, size = 120 }) {
  const r = 44, circumference = 2 * Math.PI * r;
  const offset = circumference - (score / 100) * circumference;
  const color = score >= 75 ? '#4a6e4e' : score >= 50 ? '#c9a84c' : '#c4714a';
  return (
    <div className="score-circle" style={{ width: size, height: size }}>
      <svg width={size} height={size} viewBox="0 0 120 120">
        <circle cx="60" cy="60" r={r} fill="none" stroke="#e8ede9" strokeWidth="8"/>
        <circle cx="60" cy="60" r={r} fill="none" stroke={color} strokeWidth="8"
          strokeDasharray={circumference} strokeDashoffset={offset}
          strokeLinecap="round" style={{ transition: 'stroke-dashoffset 0.6s ease' }}/>
      </svg>
      <div className="score-number" style={{ color }}>{score}</div>
    </div>
  );
}

// PRACTICE PAGE
function PracticePage({ asana, onBack, onSaveSession }) {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const overlayRef = useRef(null);
  const poseRef = useRef(null);
  const [cameraActive, setCameraActive] = useState(false);
  const [cameraError, setCameraError] = useState('');
  const [isDetecting, setIsDetecting] = useState(false);
  const [practiceActive, setPracticeActive] = useState(false);
  const [landmarks, setLandmarks] = useState(null);
  const [analysis, setAnalysis] = useState(null);
  const [simMode, setSimMode] = useState(false);
  const time = useTimer(practiceActive);
  const frameCount = useRef(0);
  const simInterval = useRef(null);
  const cameraStream = useRef(null);

  const formatTime = s => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;

  // Start camera
  const startCamera = useCallback(async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
      cameraStream.current = stream;
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        await videoRef.current.play();
      }
      setCameraActive(true);
      setCameraError('');
    } catch (e) {
      setCameraError('Camera not available — using simulation mode.');
      setSimMode(true);
      setCameraActive(true);
    }
  }, []);

  const stopCamera = () => {
    if (cameraStream.current) cameraStream.current.getTracks().forEach(t => t.stop());
    setCameraActive(false);
    setPracticeActive(false);
    setIsDetecting(false);
  };

  // Load MediaPipe dynamically
  useEffect(() => {
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js';
    script.onload = () => {
      try {
        const { Pose } = window;
        if (!Pose) return;
        const pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, enableSegmentation: false, minDetectionConfidence: 0.6, minTrackingConfidence: 0.5 });
        pose.onResults((results) => {
          if (results.poseLandmarks) {
            const lm = results.poseLandmarks;
            setLandmarks(lm);
            if (overlayRef.current && videoRef.current) {
              overlayRef.current.width = videoRef.current.videoWidth || 640;
              overlayRef.current.height = videoRef.current.videoHeight || 480;
              drawSkeleton(overlayRef.current, lm, videoRef.current);
            }
            const res = analyzeAngles(lm, asana);
            if (res) setAnalysis(res);
          }
        });
        poseRef.current = pose;
      } catch(e) {}
    };
    document.head.appendChild(script);
    return () => { document.head.removeChild(script); };
  }, [asana]);

  // Detection loop
  useEffect(() => {
    if (!practiceActive) return;
    if (simMode) {
      simInterval.current = setInterval(() => {
        const lm = generateSimLandmarks(asana, frameCount.current++);
        setLandmarks(lm);
        if (overlayRef.current) {
          overlayRef.current.width = 640; overlayRef.current.height = 480;
          drawSkeleton(overlayRef.current, lm, null);
        }
        const res = analyzeAngles(lm, asana);
        if (res) setAnalysis(res);
      }, 800);
      return () => clearInterval(simInterval.current);
    } else if (poseRef.current && videoRef.current) {
      const detect = async () => {
        if (videoRef.current && videoRef.current.readyState >= 2 && poseRef.current) {
          await poseRef.current.send({ image: videoRef.current });
        }
      };
      const id = setInterval(detect, 1000);
      return () => clearInterval(id);
    }
  }, [practiceActive, simMode, asana]);

  const handleStart = () => {
    setPracticeActive(true);
    setIsDetecting(true);
  };

  const handleStop = () => {
    setPracticeActive(false);
    setIsDetecting(false);
    if (analysis) onSaveSession({ asana, duration: time, score: analysis.overall, date: new Date().toISOString() });
  };

  const getStatusColor = (score) => score >= 75 ? '#27ae60' : score >= 50 ? '#e67e22' : '#e74c3c';
  const getStatusText = (score) => score >= 75 ? '✓ Correct' : score >= 50 ? '⟳ Adjust' : '✕ Incorrect';

  return (
    <div className="page" style={{ maxWidth: 1200, margin: '0 auto', padding: '24px' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 24 }}>
        <button className="btn btn-outline btn-sm" onClick={onBack}>← Back</button>
        <div>
          <h2 style={{ fontSize: 24, margin: 0 }}>{asana.emoji} {asana.name}</h2>
          <p style={{ color: 'var(--text-muted)', fontSize: 13, margin: 0 }}>{asana.sanskrit} · {asana.difficulty}</p>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr', gap: 20 }}>
        {/* LEFT: Camera */}
        <div>
          <div className="webcam-wrapper">
            {simMode ? (
              <div style={{ width: '100%', height: '100%', background: '#1a1a18', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', color: 'rgba(255,255,255,0.5)' }}>
                <div style={{ fontSize: 80, marginBottom: 16 }}>{asana.emoji}</div>
                <div style={{ fontSize: 14 }}>Simulation Mode</div>
                <div style={{ fontSize: 12, marginTop: 4 }}>Real-time pose analysis running</div>
              </div>
            ) : (
              <video ref={videoRef} autoPlay playsInline muted style={{ transform: 'scaleX(-1)' }}/>
            )}
            <canvas ref={overlayRef} className="webcam-overlay-canvas" style={{ transform: simMode ? 'none' : 'scaleX(-1)' }}/>

            {practiceActive && (
              <div className="webcam-badge">
                <div className="live-dot"/>
                <span>DETECTING</span>
              </div>
            )}
            {practiceActive && (
              <div className="timer-badge">{formatTime(time)}</div>
            )}
            {analysis && practiceActive && (
              <div style={{ position: 'absolute', bottom: 12, left: '50%', transform: 'translateX(-50%)', background: 'rgba(0,0,0,0.7)', backdropFilter: 'blur(6px)', borderRadius: 50, padding: '8px 20px', color: 'white', display: 'flex', alignItems: 'center', gap: 10, fontSize: 14 }}>
                <span style={{ color: getStatusColor(analysis.overall), fontWeight: 600 }}>{getStatusText(analysis.overall)}</span>
                <span style={{ color: 'rgba(255,255,255,0.5)' }}>|</span>
                <span>Score: <strong>{analysis.overall}</strong>/100</span>
              </div>
            )}
          </div>

          {/* Camera controls */}
          <div style={{ display: 'flex', gap: 12, marginTop: 16, flexWrap: 'wrap' }}>
            {!cameraActive ? (
              <button className="btn btn-primary" onClick={startCamera}>📷 Enable Camera</button>
            ) : !practiceActive ? (
              <button className="btn btn-primary" onClick={handleStart} style={{ background: '#27ae60' }}>▶ Start Detection</button>
            ) : (
              <button className="btn btn-danger" onClick={handleStop}>⏹ Stop & Save</button>
            )}
          </div>
          {cameraError && <p style={{ color: 'var(--terracotta)', fontSize: 13, marginTop: 8 }}>⚠️ {cameraError}</p>}

          {/* Breakdown bars */}
          {analysis && (
            <div className="card" style={{ padding: 20, marginTop: 20 }}>
              <h3 style={{ fontSize: 16, marginBottom: 16 }}>Score Breakdown</h3>
              <div style={{ display: 'flex', gap: 16 }}>
                {Object.entries(analysis.breakdown).map(([part, score]) => (
                  <div key={part} style={{ flex: 1, textAlign: 'center' }}>
                    <div style={{ height: 80, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', marginBottom: 8 }}>
                      <div style={{ height: `${score}%`, background: `linear-gradient(to top, var(--sage-dark), var(--sage-light))`, borderRadius: '4px 4px 0 0', minHeight: 4, transition: 'height 0.5s ease' }}/>
                    </div>
                    <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--charcoal)' }}>{score}</div>
                    <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 2 }}>{part}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* RIGHT PANELS: Reference, Corrections, Feedback */}
        
        {/* REFERENCE PANEL - TOP */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16, maxHeight: '50vh', overflowY: 'auto' }}>
          <div className="card" style={{ padding: 16 }}>
            <h3 style={{ fontSize: 14, fontWeight: 600, marginBottom: 12, color: 'var(--sage-dark)' }}>📖 REFERENCE</h3>
            <div style={{ textAlign: 'center', marginBottom: 12 }}>
              <div style={{ fontSize: 80, marginBottom: 8, background: 'linear-gradient(135deg, #f0f7f1, #e8ede9)', borderRadius: 12, padding: 16, border: '2px dashed var(--sage-light)', overflow: 'hidden', height: 200, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                {asana.referenceImage && asana.referenceImage.includes('.') ? (
                  <img src={asana.referenceImage} alt={asana.name} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                ) : (
                  <div style={{ fontSize: 80 }}>{asana.referenceImage || asana.emoji}</div>
                )}
              </div>
              <h3 style={{ fontSize: 13, fontWeight: 600, margin: '0 0 2px 0' }}>{asana.name}</h3>
              <p style={{ color: 'var(--text-muted)', fontSize: 11, fontStyle: 'italic', margin: 0 }}>{asana.sanskrit}</p>
            </div>
            
            <div style={{ fontSize: 12, fontWeight: 500, color: 'var(--sage-dark)', marginBottom: 8 }}>Target Angles:</div>
            {Object.entries(asana.keyAngles).map(([joint, angle]) => (
              <div key={joint} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, padding: '4px 0', borderBottom: '1px solid var(--mist)' }}>
                <span>{joint.replace(/([A-Z])/g, ' $1').slice(1)}</span>
                <span style={{ fontWeight: 500, color: 'var(--sage-dark)' }}>{angle}°</span>
              </div>
            ))}
            
            <div style={{ fontSize: 12, fontWeight: 500, color: 'var(--charcoal)', marginTop: 12, marginBottom: 8 }}>Common Mistakes:</div>
            {asana.mistakes.slice(0, 3).map((m, i) => (
              <div key={i} style={{ fontSize: 10, color: 'var(--charcoal)', padding: '3px 0', display: 'flex', gap: 6 }}>
                <span style={{ color: 'var(--terracotta)', flexShrink: 0 }}>✕</span>{m}
              </div>
            ))}
          </div>
        </div>

        {/* CORRECTIONS PANEL - MIDDLE */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16, maxHeight: '90vh', overflowY: 'auto' }}>
          <div className="card" style={{ padding: 16 }}>
            <h3 style={{ fontSize: 14, fontWeight: 600, marginBottom: 12, color: 'var(--terracotta)' }}>🔧 CORRECTIONS</h3>
            {analysis ? analysis.corrections.filter(c => c.severity !== 'good').length > 0 ? (
              analysis.corrections.filter(c => c.severity !== 'good').map((c, i) => (
                <div key={i} style={{ marginBottom: 12, paddingBottom: 12, borderBottom: '1px solid var(--mist)' }}>
                  <div style={{ fontSize: 11, fontWeight: 500, marginBottom: 2, display: 'flex', gap: 6, alignItems: 'center' }}>
                    <span style={{ color: c.severity === 'bad' ? '#e74c3c' : '#e67e22', fontSize: 14 }}>●</span>
                    {c.joint}
                  </div>
                  <div style={{ fontSize: 10, color: 'var(--text-muted)', marginBottom: 6 }}>{c.text}</div>
                  <div className="progress-bar" style={{ height: 4 }}>
                    <div className="progress-fill" style={{ width: `${c.score}%`, background: c.severity === 'bad' ? '#e74c3c' : '#e67e22' }}/>
                  </div>
                </div>
              ))
            ) : (
              <div style={{ textAlign: 'center', padding: '16px 0' }}>
                <div style={{ fontSize: 24 }}>✅</div>
                <p style={{ color: 'var(--sage-dark)', marginTop: 4, fontSize: 11 }}>No corrections!</p>
              </div>
            ) : (
              <p style={{ color: 'var(--text-muted)', fontSize: 11, padding: '8px 0' }}>Start detection</p>
            )}
            
            {/* Tip */}
            <div style={{ background: '#f0f7f1', borderRadius: 8, padding: 10, marginTop: 12, borderLeft: '2px solid var(--sage)' }}>
              <strong style={{ fontSize: 10, color: 'var(--sage-dark)', display: 'block', marginBottom: 4 }}>💡 Tip</strong>
              <p style={{ fontSize: 10, color: 'var(--charcoal)', lineHeight: 1.4, margin: 0 }}>{asana.tips}</p>
            </div>
          </div>
        </div>

        {/* FEEDBACK PANEL - BOTTOM */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16, maxHeight: '40vh', overflowY: 'auto' }}>
          <div className="card" style={{ padding: 16 }}>
            <h3 style={{ fontSize: 14, fontWeight: 600, marginBottom: 12, color: 'var(--sage-dark)' }}>📊 FEEDBACK</h3>
            {/* Score */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
              <ScoreCircle score={analysis ? analysis.overall : 0} size={80}/>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 4 }}>Accuracy</div>
                {analysis ? (
                  <>
                    <div style={{ fontSize: 16, fontWeight: 600, color: getStatusColor(analysis.overall) }}>{getStatusText(analysis.overall)}</div>
                    <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 2 }}>{formatTime(time)}</div>
                  </>
                ) : (
                  <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>Start detection</div>
                )}
              </div>
            </div>

            {/* Good corrections */}
            {analysis && (
              <>
                <div style={{ fontSize: 12, fontWeight: 500, color: 'var(--sage-dark)', marginBottom: 8 }}>✓ Good Form</div>
                {analysis.corrections.filter(c => c.severity === 'good').length > 0 ? (
                  analysis.corrections.filter(c => c.severity === 'good').map((c, i) => (
                    <div key={i} style={{ fontSize: 11, color: 'var(--charcoal)', padding: '4px 0', borderBottom: '1px solid var(--mist)', display: 'flex', gap: 6 }}>
                      <span style={{ color: '#27ae60', flexShrink: 0 }}>✓</span>{c.text}

                )}

          </div>
        </div>
      </div>
    </div>
  );

          <div key={p.id} style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '16px 20px', borderRadius: 12, border: `1.5px solid ${i === currentIdx ? 'var(--sage)' : 'var(--card-border)'}`, background: i === currentIdx ? '#f0f7f1' : 'white', cursor: 'pointer', transition: 'all 0.2s' }}
            onClick={() => setCurrentIdx(i)}>
            <div style={{ width: 40, height: 40, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', background: completed.includes(p.id) ? 'var(--sage)' : i === currentIdx ? 'var(--sage-light)' : 'var(--mist)', color: completed.includes(p.id) ? 'white' : 'var(--charcoal)', fontSize: 18 }}>
              {completed.includes(p.id) ? '✓' : p.emoji}
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 500, fontSize: 15 }}>{p.name}</div>
              <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{p.sanskrit} · {p.duration}s hold</div>
            </div>
            <DifficultyBadge level={p.difficulty}/>
          </div>
        ))}
      </div>

      <div style={{ display: 'flex', gap: 12 }}>
        <button className="btn btn-outline" style={{ flex: 1, justifyContent: 'center' }} onClick={() => { setCompleted(c => [...c, current.id]); if (currentIdx < poses.length-1) setCurrentIdx(i => i+1); }}>
          Mark Complete
        </button>
        <button className="btn btn-primary" style={{ flex: 1, justifyContent: 'center' }} onClick={() => onSelectAsana(current)}>
          Practice {current.name} →
        </button>
      </div>
    </div>
  );
}

// DASHBOARD
function DashboardPage({ sessions }) {
  const totalTime = sessions.reduce((a, s) => a + (s.duration || 0), 0);
  const avgScore = sessions.length ? Math.round(sessions.reduce((a, s) => a + (s.score || 0), 0) / sessions.length) : 0;
  const uniquePoses = new Set(sessions.map(s => s.asana?.id)).size;

  const last7 = Array.from({length: 7}, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - (6-i));
    const dayStr = d.toDateString();
    const daySessions = sessions.filter(s => new Date(s.date).toDateString() === dayStr);
    return { day: ['Su','Mo','Tu','We','Th','Fr','Sa'][d.getDay()], count: daySessions.length, score: daySessions.length ? Math.round(daySessions.reduce((a,s)=>a+(s.score||0),0)/daySessions.length) : 0, active: daySessions.length > 0 };
  });
  const maxCount = Math.max(...last7.map(d => d.count), 1);

  const recent = [...sessions].reverse().slice(0, 5);

  return (
    <div className="page" style={{ maxWidth: 1000, margin: '0 auto', padding: '32px 24px' }}>
      <h1 style={{ fontSize: 36, marginBottom: 4 }}>My Dashboard</h1>
      <p style={{ color: 'var(--text-muted)', marginBottom: 32 }}>Track your yoga journey and progress</p>

      {/* Stats */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16, marginBottom: 32 }}>
        {[
          { label: 'Sessions', value: sessions.length, icon: '🧘' },
          { label: 'Avg Score', value: avgScore, icon: '🎯' },
          { label: 'Total Min', value: Math.round(totalTime/60), icon: '⏱' },
          { label: 'Poses Done', value: uniquePoses, icon: '🌟' },
        ].map(s => (
          <div key={s.label} className="stat-card">
            <div style={{ fontSize: 28, marginBottom: 4 }}>{s.icon}</div>
            <div className="stat-number">{s.value}</div>
            <div className="stat-label">{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
        {/* Weekly activity */}
        <div className="card" style={{ padding: 24 }}>
          <h3 style={{ fontSize: 18, marginBottom: 20 }}>Weekly Activity</h3>
          <div style={{ display: 'flex', gap: 8, alignItems: 'flex-end', height: 120 }}>
            {last7.map((d, i) => (
              <div key={i} className="chart-bar">
                <div className="chart-bar-fill" style={{ height: d.count > 0 ? `${(d.count/maxCount)*100}%` : '4px', background: d.active ? 'var(--sage)' : 'var(--mist)' }}/>
                <div className="chart-bar-label" style={{ color: d.active ? 'var(--sage-dark)' : 'var(--text-muted)' }}>{d.day}</div>
              </div>
            ))}
          </div>

          {/* Streak calendar */}
          <div style={{ marginTop: 20 }}>
            <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 12, color: 'var(--text-muted)' }}>Streak Calendar</div>
            <div style={{ display: 'flex', gap: 4 }}>
              {last7.map((d, i) => (
                <div key={i} className={`streak-day ${d.active ? 'streak-active' : 'streak-inactive'} ${i===6 ? 'streak-today' : ''}`}>
                  {d.count > 0 ? '🔥' : d.day[0]}
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Recent sessions */}
        <div className="card" style={{ padding: 24 }}>
          <h3 style={{ fontSize: 18, marginBottom: 16 }}>Recent Sessions</h3>
          {recent.length === 0 ? (
            <div style={{ textAlign: 'center', padding: '32px 0', color: 'var(--text-muted)' }}>
              <div style={{ fontSize: 40, marginBottom: 8 }}>🌱</div>
              <p style={{ fontSize: 14 }}>No sessions yet. Start practicing!</p>
            </div>
          ) : (
            recent.map((s, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 0', borderBottom: '1px solid var(--mist)' }}>
                <div style={{ fontSize: 28 }}>{s.asana?.emoji || '🧘'}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 500 }}>{s.asana?.name || 'Unknown'}</div>
                  <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{new Date(s.date).toLocaleDateString()}</div>
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div style={{ fontSize: 16, fontWeight: 600, color: 'var(--sage-dark)' }}>{s.score}</div>
                  <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>score</div>
                </div>
              </div>
            ))
          )}
        </div>
      </div>

      {/* Pose breakdown */}
      {sessions.length > 0 && (
        <div className="card" style={{ padding: 24, marginTop: 24 }}>
          <h3 style={{ fontSize: 18, marginBottom: 16 }}>Pose Performance</h3>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {Object.entries(sessions.reduce((acc, s) => {
              const id = s.asana?.id;
              if (!id) return acc;
              if (!acc[id]) acc[id] = { asana: s.asana, scores: [] };
              acc[id].scores.push(s.score || 0);
              return acc;
            }, {})).map(([id, { asana: a, scores }]) => {
              const avg = Math.round(scores.reduce((x,y)=>x+y,0)/scores.length);
              return (
                <div key={id} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                  <span style={{ fontSize: 24, width: 32 }}>{a.emoji}</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                      <span style={{ fontSize: 13, fontWeight: 500 }}>{a.name}</span>
                      <span style={{ fontSize: 13, color: 'var(--sage-dark)', fontWeight: 500 }}>{avg}/100</span>
                    </div>
                    <div className="progress-bar"><div className="progress-fill" style={{ width: `${avg}%` }}/></div>
                  </div>
                  <span style={{ fontSize: 12, color: 'var(--text-muted)', width: 40, textAlign: 'right' }}>{scores.length}x</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// PROFILE
function ProfilePage({ sessions }) {
  const totalTime = sessions.reduce((a,s) => a + (s.duration||0), 0);
  const levels = { beginner: 0, intermediate: 0, advanced: 0 };
  sessions.forEach(s => { if (s.asana?.difficulty) levels[s.asana.difficulty]++; });
  return (
    <div className="page" style={{ maxWidth: 700, margin: '0 auto', padding: '32px 24px' }}>
      <div style={{ textAlign: 'center', marginBottom: 32 }}>
        <div style={{ width: 80, height: 80, borderRadius: '50%', background: 'var(--sage)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px', fontSize: 36 }}>🧘</div>
        <h1 style={{ fontSize: 28, marginBottom: 4 }}>Yoga Practitioner</h1>
        <p style={{ color: 'var(--text-muted)' }}>Member since {new Date().toLocaleDateString('en-US', {month:'long', year:'numeric'})}</p>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 16, marginBottom: 32 }}>
        {[
          { label: 'Sessions', value: sessions.length },
          { label: 'Minutes', value: Math.round(totalTime/60) },
          { label: 'Avg Score', value: sessions.length ? Math.round(sessions.reduce((a,s)=>a+(s.score||0),0)/sessions.length) : 0 },
        ].map(s => (
          <div key={s.label} className="stat-card">
            <div className="stat-number">{s.value}</div>
            <div className="stat-label">{s.label}</div>
          </div>
        ))}
      </div>
      <div className="card" style={{ padding: 24, marginBottom: 20 }}>
        <h3 style={{ fontSize: 18, marginBottom: 16 }}>Practice Distribution</h3>
        {Object.entries(levels).map(([level, count]) => (
          <div key={level} style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
            <span style={{ width: 100, fontSize: 13, textTransform: 'capitalize' }}>{level}</span>
            <div className="progress-bar" style={{ flex: 1 }}>
              <div className="progress-fill" style={{ width: sessions.length ? `${(count/sessions.length)*100}%` : '0%' }}/>
            </div>
            <span style={{ fontSize: 13, color: 'var(--text-muted)', width: 24 }}>{count}</span>
          </div>
        ))}
      </div>
      <div className="card" style={{ padding: 24 }}>
        <h3 style={{ fontSize: 18, marginBottom: 16 }}>Achievements</h3>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12 }}>
          {[
            { icon: '🌱', label: 'First Session', earned: sessions.length >= 1 },
            { icon: '🔥', label: '5 Sessions', earned: sessions.length >= 5 },
            { icon: '⭐', label: 'Score 80+', earned: sessions.some(s => s.score >= 80) },
            { icon: '🏆', label: '10 Sessions', earned: sessions.length >= 10 },
            { icon: '💎', label: 'Advanced Pose', earned: sessions.some(s => s.asana?.difficulty === 'advanced') },
            { icon: '🌟', label: 'Score 90+', earned: sessions.some(s => s.score >= 90) },
          ].map(a => (
            <div key={a.label} style={{ padding: '12px 16px', borderRadius: 12, border: `1.5px solid ${a.earned ? 'var(--sage)' : 'var(--card-border)'}`, background: a.earned ? '#f0f7f1' : 'white', opacity: a.earned ? 1 : 0.4, textAlign: 'center', minWidth: 90 }}>
              <div style={{ fontSize: 28 }}>{a.icon}</div>
              <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 4 }}>{a.label}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// SETTINGS
function SettingsPage() {
  const [settings, setSettings] = useLocalStorage('yv-settings', {
    detectionInterval: 1, showSkeleton: true, autoCorrect: true, sound: false, darkMode: false, highContrast: false,
  });
  const toggle = (key) => setSettings(s => ({ ...s, [key]: !s[key] }));
  const items = [
    { key: 'showSkeleton', label: 'Show Skeleton Overlay', desc: 'Draw joint connections on webcam feed' },
    { key: 'autoCorrect', label: 'Auto Corrections', desc: 'Show real-time correction suggestions' },
    { key: 'sound', label: 'Sound Feedback', desc: 'Play audio cues for corrections' },
    { key: 'highContrast', label: 'High Contrast Mode', desc: 'Increase visibility of skeleton overlay' },
  ];
  return (
    <div className="page" style={{ maxWidth: 600, margin: '0 auto', padding: '32px 24px' }}>
      <h1 style={{ fontSize: 36, marginBottom: 4 }}>Settings</h1>
      <p style={{ color: 'var(--text-muted)', marginBottom: 32 }}>Customize your practice experience</p>
      <div className="card" style={{ padding: 24, marginBottom: 20 }}>
        <h3 style={{ fontSize: 16, marginBottom: 20 }}>Detection Settings</h3>
        <div style={{ marginBottom: 20 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
            <label style={{ fontSize: 14, fontWeight: 500 }}>Detection Interval</label>
            <span style={{ fontSize: 14, color: 'var(--sage-dark)', fontWeight: 500 }}>{settings.detectionInterval}s</span>
          </div>
          <input type="range" min="1" max="3" value={settings.detectionInterval} step="1"
            onChange={e => setSettings(s => ({ ...s, detectionInterval: +e.target.value }))}
            style={{ width: '100%' }}/>
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'var(--text-muted)', marginTop: 4 }}>
            <span>Faster (1s)</span><span>Slower (3s)</span>
          </div>
        </div>
      </div>
      <div className="card" style={{ padding: 24 }}>
        <h3 style={{ fontSize: 16, marginBottom: 20 }}>Preferences</h3>
        {items.map(item => (
          <div key={item.key} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 0', borderBottom: '1px solid var(--mist)' }}>
            <div>
              <div style={{ fontSize: 14, fontWeight: 500 }}>{item.label}</div>
              <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 2 }}>{item.desc}</div>
            </div>
            <Toggle on={settings[item.key]} onToggle={() => toggle(item.key)}/>
          </div>
        ))}
      </div>
    </div>
  );
}

// ABOUT
function AboutPage() {
  return (
    <div className="page" style={{ maxWidth: 700, margin: '0 auto', padding: '32px 24px' }}>
      <div style={{ textAlign: 'center', marginBottom: 40 }}>
        <div style={{ fontSize: 64, marginBottom: 16 }}></div>
        <h1 style={{ fontSize: 40, marginBottom: 8 }}>Yoga AI</h1>
        <p style={{ color: 'var(--text-muted)', fontSize: 16 }}>Intelligent Posture Recognition for the Modern Yogi</p>
      </div>
      {[
        { title: ' How It Works', content: 'Yoga AI uses MediaPipe Pose — a state-of-the-art ML model that detects 33 body landmarks in real-time. These landmarks are analyzed to compute joint angles, which are then compared against ideal target angles for each asana. The system generates a pose accuracy score and specific corrections.' },
        { title: ' Angle Analysis', content: 'Each yoga pose is defined by a set of target angles at key joints (knees, hips, shoulders, elbows). The AI computes the actual angles from your webcam feed and identifies deviations. Corrections are prioritized by severity — helping you focus on the most impactful adjustments first.' },
        { title: ' Scoring System', content: 'Your pose accuracy is scored 0–100 based on how closely your joint angles match the ideal for each asana. The score breaks down into arms, legs, and posture components. A score of 75+ is considered "Correct", 50–74 suggests adjustments, and below 50 needs significant correction.' },
        { title: ' Privacy', content: 'All pose detection runs entirely in your browser using your local GPU/CPU. Your webcam feed never leaves your device. No video is recorded or transmitted to any server.' },
      ].map(s => (
        <div key={s.title} className="card" style={{ padding: 24, marginBottom: 16 }}>
          <h3 style={{ fontSize: 18, marginBottom: 12 }}>{s.title}</h3>
          <p style={{ fontSize: 14, color: 'var(--charcoal)', lineHeight: 1.7 }}>{s.content}</p>
        </div>
      ))}
    </div>
  );
}

// ─────────────────────────────────────────────
// APP ROOT
// ─────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  const [selectedAsana, setSelectedAsana] = useState(null);
  const [selectedSession, setSelectedSession] = useState(null);
  const [sessions, setSessions] = useLocalStorage('yv-sessions', []);

  const navTo = (pg, data) => {
    setPage(pg);
    if (data && pg === 'session') setSelectedSession(data);
  };

  const handleSelectAsana = (asana) => {
    setSelectedAsana(asana);
    setPage('detail');
  };

  const handleStartPractice = (asana) => {
    setSelectedAsana(asana);
    setPage('practice');
  };

  const handleSaveSession = (sess) => {
    setSessions(prev => [...prev, sess]);
  };

  const navLinks = [
    { key: 'home', label: 'Home' },
    { key: 'library', label: 'Library' },
    { key: 'dashboard', label: 'Dashboard' },
    { key: 'profile', label: 'Profile' },
    { key: 'about', label: 'About' },
    { key: 'settings', label: 'Settings' },
  ];

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <nav>
        <div className="nav-logo" onClick={() => setPage('home')}>
          <span></span>
          Yoga AI
        </div>
        <div className="nav-links">
          {navLinks.map(l => (
            <button key={l.key} className={`nav-link ${page === l.key ? 'active' : ''}`} onClick={() => navTo(l.key)}>
              {l.label}
            </button>
          ))}
        </div>
      </nav>

      <div style={{ flex: 1 }}>
        {page === 'home' && <HomePage onSelectAsana={handleSelectAsana} onNav={navTo}/>}
        {page === 'library' && <LibraryPage onSelectAsana={handleSelectAsana}/>}
        {page === 'detail' && selectedAsana && (
          <AsanaDetailPage asana={selectedAsana} onStart={handleStartPractice} onBack={() => setPage(page === 'detail' ? 'home' : 'library')}/>
        )}
        {page === 'practice' && selectedAsana && (
          <PracticePage asana={selectedAsana} onBack={() => setPage('detail')} onSaveSession={handleSaveSession}/>
        )}
        {page === 'session' && selectedSession && (
          <SessionPage session={selectedSession} onBack={() => setPage('home')} onSelectAsana={handleSelectAsana}/>
        )}
        {page === 'dashboard' && <DashboardPage sessions={sessions}/>}
        {page === 'profile' && <ProfilePage sessions={sessions}/>}
        {page === 'settings' && <SettingsPage/>}
        {page === 'about' && <AboutPage/>}
      </div>

      <footer>
        <div style={{ fontSize: 20, marginBottom: 8 }}></div>
        <strong>Yoga AI</strong> — Real-Time Posture Recognition<br/>
        Powered by MediaPipe · All processing runs locally in your browser
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
